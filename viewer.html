<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planter Box Gate — 3D Build Plan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1e;
    color: #e8e4df;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  #canvas-container { width: 100%; height: 100%; position: relative; }
  canvas { display: block; }

  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  #title-bar { position: absolute; top: 20px; left: 24px; pointer-events: auto; }
  #title-bar h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 600; color: #c8b89a;
    letter-spacing: 1px; text-transform: uppercase;
  }
  #title-bar p { font-size: 13px; color: #8a8580; margin-top: 4px; }

  #controls {
    position: absolute; top: 20px; right: 24px;
    display: flex; gap: 8px; pointer-events: auto; flex-wrap: wrap; justify-content: flex-end;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #c8b89a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 7px 14px; border-radius: 6px;
    cursor: pointer; transition: all 0.3s ease;
    backdrop-filter: blur(10px); white-space: nowrap;
  }
  .ctrl-btn:hover { background: rgba(200,184,154,0.15); border-color: rgba(200,184,154,0.3); }
  .ctrl-btn.active { background: rgba(200,184,154,0.2); border-color: #c8b89a; color: #fff; }

  #tooltip {
    position: absolute; display: none;
    background: rgba(30,28,26,0.95); border: 1px solid rgba(200,184,154,0.3);
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    pointer-events: none; backdrop-filter: blur(12px);
    max-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100;
  }
  #tooltip .tt-name { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #c8b89a; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  #tooltip .tt-desc { color: #a8a4a0; font-size: 12px; line-height: 1.4; }
  #tooltip .tt-dim { color: #7a7670; font-size: 11px; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

  #explosion-slider-wrap {
    position: absolute; top: 62px; right: 24px; pointer-events: auto;
    display: none; align-items: center; gap: 10px;
  }
  #explosion-slider-wrap label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #8a8580; }
  #explosion-slider { width: 140px; accent-color: #c8b89a; }

  #instructions {
    position: absolute; bottom: 24px; right: 24px;
    font-size: 11px; color: #5a5650; text-align: right; line-height: 1.6; pointer-events: none;
  }

  /* ---- 3D LABELS ---- */
  #labels-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5; overflow: hidden;
  }

  .label-3d {
    position: absolute;
    transform: translate(-50%, -100%);
    pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
  }

  .label-3d .label-line {
    width: 1px; height: 20px;
    background: rgba(200,184,154,0.4);
    margin: 0 auto;
  }

  .label-3d .label-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    color: #c8b89a;
    background: rgba(26,26,30,0.85);
    border: 1px solid rgba(200,184,154,0.25);
    padding: 3px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    backdrop-filter: blur(6px);
    text-align: center;
  }

  .label-3d .label-dim {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: #7a7670;
    text-align: center;
    margin-top: 1px;
  }

  .label-3d.faded { opacity: 0.15; }
  .label-3d.hidden { opacity: 0; }

  /* Color-coded dots by category */
  .label-3d .label-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 1px;
    margin-right: 4px;
    vertical-align: middle;
  }

  .dot-frame { background: #b8956a; }
  .dot-platform { background: #d4a55a; }
  .dot-cladding { background: #9b8365; }
  .dot-fill { background: #6b5040; }
  .dot-liner { background: #555; }
  .dot-gate-frame { background: #a0c080; }
  .dot-gate-pickets { background: #80b060; }
  .dot-hardware { background: #b0b0b0; }

  #legend {
    position: absolute; bottom: 24px; left: 24px;
    display: flex; flex-wrap: wrap; gap: 6px; pointer-events: none;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px; padding: 3px 8px; font-size: 10px; color: #8a8580;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="canvas-container">
  <div id="labels-container"></div>
  <div id="ui-overlay">
    <div id="title-bar">
      <h1>Planter Box Gate</h1>
      <p>Interactive 3D Build Plan — hover parts for details</p>
    </div>

    <div id="controls">
      <button class="ctrl-btn active" id="btn-assembled" onclick="setView('assembled')">Assembled</button>
      <button class="ctrl-btn" id="btn-exploded" onclick="setView('exploded')">Exploded</button>
      <button class="ctrl-btn" id="btn-gate-only" onclick="setView('gate')">Gate Only</button>
      <button class="ctrl-btn" id="btn-planter-only" onclick="setView('planter')">Planter Only</button>
      <button class="ctrl-btn" id="btn-labels-toggle" onclick="toggleLabels()">Labels: ON</button>
      <button class="ctrl-btn" id="btn-reset" onclick="resetCamera()">Reset</button>
    </div>

    <div id="explosion-slider-wrap">
      <label>SPREAD</label>
      <input type="range" id="explosion-slider" min="0" max="100" value="60">
    </div>

    <div id="tooltip">
      <div class="tt-name"></div>
      <div class="tt-desc"></div>
      <div class="tt-dim"></div>
    </div>

    <div id="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#b8956a"></div>Frame</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d4a55a"></div>Platform</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9b8365"></div>Cladding</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6b5040"></div>Fill</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a0c080"></div>Gate Frame</div>
      <div class="legend-item"><div class="legend-dot" style="background:#80b060"></div>Gate Pickets</div>
      <div class="legend-item"><div class="legend-dot" style="background:#b0b0b0"></div>Hardware</div>
    </div>

    <div id="instructions">Drag to rotate · Scroll to zoom · Hover for details</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// SCENE
// ============================================================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1e);
scene.fog = new THREE.Fog(0x1a1a1e, 8, 22);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(3.5, 2.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffeedd, 0.4));
const dir = new THREE.DirectionalLight(0xfff5e0, 1.2);
dir.position.set(5, 8, 4); dir.castShadow = true;
dir.shadow.mapSize.set(2048,2048);
dir.shadow.camera.near=0.1; dir.shadow.camera.far=20;
dir.shadow.camera.left=-5; dir.shadow.camera.right=5;
dir.shadow.camera.top=5; dir.shadow.camera.bottom=-5;
scene.add(dir);
scene.add(new THREE.DirectionalLight(0xc0d0ff, 0.3).translateX(-3).translateY(4).translateZ(-2));
const rim = new THREE.PointLight(0xffddaa, 0.5, 10); rim.position.set(-2,3,3); scene.add(rim);

// Ground + grid
const gnd = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.MeshStandardMaterial({color:0x2a2a2e,roughness:0.95}));
gnd.rotation.x = -Math.PI/2; gnd.position.y = -0.01; gnd.receiveShadow = true; scene.add(gnd);
scene.add(new THREE.GridHelper(6, 30, 0x333338, 0x28282c));

// ============================================================
// MATERIALS
// ============================================================
const M = {
  timber: new THREE.MeshStandardMaterial({color:0x8B7355, roughness:0.75}),
  timberDk: new THREE.MeshStandardMaterial({color:0x6B5B45, roughness:0.8}),
  clad: new THREE.MeshStandardMaterial({color:0x9B8365, roughness:0.7}),
  soil: new THREE.MeshStandardMaterial({color:0x4A3728, roughness:0.95}),
  rocks: new THREE.MeshStandardMaterial({color:0x6B6B6B, roughness:0.85, metalness:0.1}),
  plastic: new THREE.MeshStandardMaterial({color:0x2a2a2a, roughness:0.4, transparent:true, opacity:0.5}),
  metal: new THREE.MeshStandardMaterial({color:0xA8A8A8, roughness:0.35, metalness:0.7}),
  metalDk: new THREE.MeshStandardMaterial({color:0x707070, roughness:0.4, metalness:0.6}),
  hl: new THREE.MeshStandardMaterial({color:0xffcc66, roughness:0.5, metalness:0.1, emissive:0x332200, emissiveIntensity:0.3}),
};

// ============================================================
// PART REGISTRY + LABEL SYSTEM
// ============================================================
const allParts = [];
const labelData = []; // { mesh, el, worldPos, labelId, category }
let labelsVisible = true;
let hoveredPart = null;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-10,-10);

const labelsContainer = document.getElementById('labels-container');

const catDotClass = {
  frame:'dot-frame', platform:'dot-platform', cladding:'dot-cladding',
  fill:'dot-fill', liner:'dot-liner',
  'gate-frame':'dot-gate-frame', 'gate-pickets':'dot-gate-pickets',
  hardware:'dot-hardware',
};

// Only create labels for "representative" parts, not every single identical piece
const labelledNames = new Set();

function registerPart(mesh, info) {
  mesh.userData = {
    ...info,
    originalMaterial: mesh.material,
    assembledPos: mesh.position.clone(),
    explodedOffset: info.explodedOffset || new THREE.Vector3(),
    category: info.category || 'misc',
  };
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  allParts.push(mesh);

  // Create a label for unique part names or always for hardware/special parts
  const shouldLabel = info.forceLabel || !labelledNames.has(info.name + '_' + info.category + '_' + (mesh.parent?.position.x > 0 ? 'R' : 'L'));
  if (shouldLabel && info.name) {
    labelledNames.add(info.name + '_' + info.category + '_' + (mesh.parent?.position.x > 0 ? 'R' : 'L'));

    const el = document.createElement('div');
    el.className = 'label-3d';
    const dotCls = catDotClass[info.category] || 'dot-frame';
    el.innerHTML = `
      <div class="label-text"><span class="label-dot ${dotCls}"></span>${info.name}</div>
      <div class="label-dim">${info.dim || ''}</div>
      <div class="label-line"></div>
    `;
    labelsContainer.appendChild(el);

    labelData.push({
      mesh,
      el,
      category: info.category,
    });
  }

  return mesh;
}

// ============================================================
// BUILD PLANTER BOX
// ============================================================
function createPlanter(offsetX) {
  const g = new THREE.Group();
  g.position.x = offsetX;
  const W=0.40, D=0.40, H=1.20, pW=0.045, pD=0.095;
  const bT=0.016, bW=0.10, platH=0.60;
  const side = offsetX > 0 ? 1 : -1;
  const tag = offsetX > 0 ? 'Right' : 'Left';

  // Corner posts
  for(let xi=0;xi<2;xi++) for(let zi=0;zi<2;zi++){
    const geo=new THREE.BoxGeometry(pW,H,pD);
    const m=new THREE.Mesh(geo,M.timber);
    m.position.set(xi?W/2-pW/2:-W/2+pW/2, H/2, zi?D/2-pD/2:-D/2+pD/2);
    const isFirst = xi===0 && zi===0;
    g.add(registerPart(m,{
      name:'Corner Post', desc:`Trykimp. reglar 45×95mm, 120cm. ${tag} planter.`, dim:'45×95×1200mm',
      category:'frame', forceLabel: isFirst,
      explodedOffset:new THREE.Vector3((xi?0.3:-0.3)*side, 0, zi?0.3:-0.3),
    }));
  }

  // Rails at 3 levels
  [{y:0.045,n:'Bottom Rail'},{y:platH,n:'Platform Rail'},{y:H-0.045,n:'Top Rail'}].forEach(lv=>{
    for(let zi=0;zi<2;zi++){
      const len=W-2*pW;
      const m=new THREE.Mesh(new THREE.BoxGeometry(len,pW,pD),M.timberDk);
      m.position.set(0, lv.y, zi?D/2-pD/2:-D/2+pD/2);
      g.add(registerPart(m,{
        name:lv.n, desc:`Horizontal rail at ${Math.round(lv.y*100)}cm. ${tag} planter.`, dim:`45×95×${Math.round(len*1000)}mm`,
        category:'frame', forceLabel: zi===0,
        explodedOffset:new THREE.Vector3(0, (lv.y-0.5)*0.6, zi?0.35:-0.35),
      }));
    }
    for(let xi=0;xi<2;xi++){
      const len=D-2*pD;
      const m=new THREE.Mesh(new THREE.BoxGeometry(pW,pW,len),M.timberDk);
      m.position.set(xi?W/2-pW/2:-W/2+pW/2, lv.y, 0);
      g.add(registerPart(m,{
        name:lv.n, desc:`Side rail at ${Math.round(lv.y*100)}cm.`, dim:`45×95×${Math.round(len*1000)}mm`,
        category:'frame',
        explodedOffset:new THREE.Vector3((xi?0.35:-0.35)*side, (lv.y-0.5)*0.6, 0),
      }));
    }
  });

  // Platform boards
  for(let i=0;i<3;i++){
    const bLen=W-2*pW-0.01, bWid=(D-2*pD-0.01)/3;
    const m=new THREE.Mesh(new THREE.BoxGeometry(bLen,bT,bWid-0.005),M.timber);
    m.position.set(0, platH+bT/2, -D/2+pD+bWid/2+0.005+i*bWid);
    g.add(registerPart(m,{
      name:'Shelf Board', desc:'Forskallingsbræt at 60cm. Drill drainage holes!', dim:'15×95×~310mm',
      category:'platform', forceLabel: i===1,
      explodedOffset:new THREE.Vector3(0, -0.2+i*0.06, 0),
    }));
  }

  // Plastic liner
  const lH=H-platH-bT-0.01;
  const lm=new THREE.Mesh(new THREE.BoxGeometry(W-2*pW-0.01,lH,D-2*pD-0.01),M.plastic);
  lm.position.set(0, platH+bT+lH/2+0.005, 0);
  g.add(registerPart(lm,{
    name:'Plastic Liner', desc:'Plastfolie 0.2mm. Prevents soil rotting the wood.', dim:'~0.5 m²',
    category:'liner', forceLabel:true,
    explodedOffset:new THREE.Vector3(side*0.5, 0.3, 0),
  }));

  // Rocks
  const rm=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.20,0.28),M.rocks);
  rm.position.set(0, 0.15, 0);
  g.add(registerPart(rm,{
    name:'Ballast Slabs', desc:'Betonflise 40×40×6cm inside for weight. ~30kg per box.', dim:'2× 40×40×6cm',
    category:'fill', forceLabel:true,
    explodedOffset:new THREE.Vector3(0, -0.5, 0),
  }));

  // Soil
  const sH=lH-0.02;
  const sm=new THREE.Mesh(new THREE.BoxGeometry(W-2*pW-0.02,sH,D-2*pD-0.02),M.soil);
  sm.position.set(0, platH+bT+sH/2+0.01, 0);
  g.add(registerPart(sm,{
    name:'Potting Soil', desc:'Plantejord, 40cm deep. Plant herbs or flowers!', dim:'~40L per box',
    category:'fill', forceLabel:true,
    explodedOffset:new THREE.Vector3(0, 0.6, 0),
  }));

  // Cladding
  [{ax:'x',d:-1,f:'Front'},{ax:'x',d:1,f:'Back'},{ax:'z',d:-1,f:'Left Side'},{ax:'z',d:1,f:'Right Side'}].forEach(s=>{
    for(let i=0;i<3;i++){
      let geo,px,pz,ex,ez;
      const py=H/2;
      if(s.ax==='x'){
        const bLen=D-0.01;
        geo=new THREE.BoxGeometry(bT,H,bLen/3-0.003);
        px=s.d*(W/2+bT/2); pz=-bLen/2+(bLen/3)*(i+0.5);
        ex=s.d*0.4*side; ez=0;
      } else {
        const bLen=W+bT*2;
        geo=new THREE.BoxGeometry(bLen/3-0.003,H,bT);
        pz=s.d*(D/2+bT/2); px=-bLen/2+(bLen/3)*(i+0.5);
        ez=s.d*0.4; ex=0;
      }
      const m=new THREE.Mesh(geo,M.clad);
      m.position.set(px,py,pz);
      g.add(registerPart(m,{
        name:`Cladding (${s.f})`, desc:`Imp. ru bræt 16×100mm, ${s.f.toLowerCase()}.`, dim:'16×100×1200mm',
        category:'cladding', forceLabel: i===1,
        explodedOffset:new THREE.Vector3(ex,0,ez),
      }));
    }
  });

  // Angle brackets
  for(let xi=0;xi<2;xi++) for(let zi=0;zi<2;zi++){
    const m=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.05,0.015),M.metal);
    m.position.set(xi?W/2-0.04:-W/2+0.04, H-0.06, zi?D/2-0.05:-D/2+0.05);
    const isFirst=xi===0&&zi===0;
    g.add(registerPart(m,{
      name:'Angle Bracket', desc:'Vinkelbeslag 40×40mm. Reinforces corners.', dim:'40×40mm',
      category:'hardware', forceLabel:isFirst,
      explodedOffset:new THREE.Vector3((xi?0.5:-0.5)*side, 0.4, zi?0.5:-0.5),
    }));
  }

  scene.add(g);
  return g;
}

// ============================================================
// BUILD GATE
// ============================================================
function createGate(){
  const g=new THREE.Group();
  const gW=1.20, gH=1.18, rW=0.045, rD=0.070;
  const pT=0.022, pW=0.070, nP=14;

  // Top rail
  const tm=new THREE.Mesh(new THREE.BoxGeometry(gW,rW,rD),M.timber);
  tm.position.set(0,gH-rW/2,0);
  g.add(registerPart(tm,{name:'Gate Top Rail',desc:'Top horizontal frame member.',dim:'45×95×1200mm',category:'gate-frame',forceLabel:true,explodedOffset:new THREE.Vector3(0,0.5,0)}));

  // Bottom rail
  const bm=new THREE.Mesh(new THREE.BoxGeometry(gW,rW,rD),M.timber);
  bm.position.set(0,rW/2+0.02,0);
  g.add(registerPart(bm,{name:'Gate Bottom Rail',desc:'Bottom frame member. 2cm ground clearance.',dim:'45×95×1200mm',category:'gate-frame',forceLabel:true,explodedOffset:new THREE.Vector3(0,-0.4,0)}));

  // Hinge stile
  const hm=new THREE.Mesh(new THREE.BoxGeometry(rW,gH,rD),M.timber);
  hm.position.set(-gW/2+rW/2,gH/2,0);
  g.add(registerPart(hm,{name:'Hinge Stile',desc:'Vertical frame, hinge side.',dim:'45×95×1180mm',category:'gate-frame',forceLabel:true,explodedOffset:new THREE.Vector3(-0.4,0,0)}));

  // Latch stile
  const lm=new THREE.Mesh(new THREE.BoxGeometry(rW,gH,rD),M.timber);
  lm.position.set(gW/2-rW/2,gH/2,0);
  g.add(registerPart(lm,{name:'Latch Stile',desc:'Vertical frame, latch side.',dim:'45×95×1180mm',category:'gate-frame',forceLabel:true,explodedOffset:new THREE.Vector3(0.4,0,0)}));

  // Diagonal brace
  const dLen=Math.sqrt(gW*gW+gH*gH)*0.85;
  const dA=Math.atan2(gH,gW);
  const dm=new THREE.Mesh(new THREE.BoxGeometry(dLen,rW*0.8,rD*0.8),M.timberDk);
  dm.position.set(0,gH/2,-0.001); dm.rotation.z=dA;
  g.add(registerPart(dm,{name:'Diagonal Brace',desc:'Z-brace prevents sag. Critical for 1.2m width!',dim:'45×70×~1570mm',category:'gate-frame',forceLabel:true,explodedOffset:new THREE.Vector3(0,0,-0.5)}));

  // Pickets
  const pSp=(gW-2*rW)/nP;
  for(let i=0;i<nP;i++){
    const m=new THREE.Mesh(new THREE.BoxGeometry(pW,gH,pT),M.clad);
    m.position.set(-gW/2+rW+pSp*(i+0.5), gH/2, rD/2+pT/2);
    const isMiddle = i===Math.floor(nP/2);
    g.add(registerPart(m,{
      name:'Gate Picket',desc:`Board #${i+1}. Gaps ≤6cm for toddler safety.`,dim:'16×100×1180mm',
      category:'gate-pickets',forceLabel:isMiddle,
      explodedOffset:new THREE.Vector3(0,0,0.3+i*0.03),
    }));
  }

  // T-Hinges
  [0.15,0.50,0.85].forEach((hy,idx)=>{
    const sm=new THREE.Mesh(new THREE.BoxGeometry(0.20,0.025,0.004),M.metal);
    sm.position.set(-gW/2+rW+0.08, hy*gH, rD/2+pT+0.003);
    g.add(registerPart(sm,{
      name:`T-Hinge #${idx+1}`,desc:'T-hængsel 300mm galvaniseret.',dim:'300×32mm',
      category:'hardware',forceLabel:true,
      explodedOffset:new THREE.Vector3(-0.6,(idx-1)*0.2,0.4),
    }));
    const pm=new THREE.Mesh(new THREE.BoxGeometry(0.004,0.08,0.025),M.metalDk);
    pm.position.set(-gW/2-0.005, hy*gH, rD/2+pT+0.003);
    g.add(registerPart(pm,{
      name:`Hinge Pin #${idx+1}`,desc:'Stable mount on planter box.',dim:'Part of T-hinge',
      category:'hardware',
      explodedOffset:new THREE.Vector3(-0.8,(idx-1)*0.2,0.4),
    }));
  });

  // Stalddørsgreb
  const latch=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.12,0.04),M.metal);
  latch.position.set(gW/2-rW-0.02, gH*0.85, rD/2+pT+0.02);
  g.add(registerPart(latch,{
    name:'Stalddørsgreb (Latch)',desc:'Thumb latch at adult height. Arthur can\'t reach!',dim:'For doors 40-90mm',
    category:'hardware',forceLabel:true,
    explodedOffset:new THREE.Vector3(0.6,0.3,0.5),
  }));

  // Slide bolt
  const bolt=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.02,0.025),M.metalDk);
  bolt.position.set(gW/2-rW-0.06, 0.08, rD/2+pT+0.015);
  g.add(registerPart(bolt,{
    name:'Skudrigle (Slide Bolt)',desc:'Bottom bolt 150mm. Extra toddler security.',dim:'150mm',
    category:'hardware',forceLabel:true,
    explodedOffset:new THREE.Vector3(0.6,-0.4,0.5),
  }));

  scene.add(g);
  return g;
}

// ============================================================
// BUILD
// ============================================================
createPlanter(-0.80);
createPlanter(0.80);
createGate();

// ============================================================
// CAMERA CONTROLS
// ============================================================
let isDragging=false, prevM={x:0,y:0};
let sph={theta:0.7,phi:1.1,radius:5.5};
let tSph={...sph};
const lookAt=new THREE.Vector3(0,0.45,0);

function updateCam(){
  sph.theta+=(tSph.theta-sph.theta)*0.08;
  sph.phi+=(tSph.phi-sph.phi)*0.08;
  sph.radius+=(tSph.radius-sph.radius)*0.08;
  camera.position.set(
    lookAt.x+sph.radius*Math.sin(sph.phi)*Math.cos(sph.theta),
    lookAt.y+sph.radius*Math.cos(sph.phi),
    lookAt.z+sph.radius*Math.sin(sph.phi)*Math.sin(sph.theta)
  );
  camera.lookAt(lookAt);
}

renderer.domElement.addEventListener('mousedown',e=>{isDragging=true;prevM={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>{isDragging=false;});
window.addEventListener('mousemove',e=>{
  if(isDragging){
    tSph.theta-=(e.clientX-prevM.x)*0.005;
    tSph.phi=Math.max(0.3,Math.min(Math.PI-0.1,tSph.phi+(e.clientY-prevM.y)*0.005));
    prevM={x:e.clientX,y:e.clientY};
  }
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
});
renderer.domElement.addEventListener('wheel',e=>{
  tSph.radius=Math.max(1.5,Math.min(12,tSph.radius+e.deltaY*0.003));
});

// Touch
let tDist=0;
renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDragging=true;prevM={x:e.touches[0].clientX,y:e.touches[0].clientY};}
  else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;tDist=Math.sqrt(dx*dx+dy*dy);}
  e.preventDefault();
},{passive:false});
renderer.domElement.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&isDragging){
    tSph.theta-=(e.touches[0].clientX-prevM.x)*0.005;
    tSph.phi=Math.max(0.3,Math.min(Math.PI-0.1,tSph.phi+(e.touches[0].clientY-prevM.y)*0.005));
    prevM={x:e.touches[0].clientX,y:e.touches[0].clientY};
  } else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.sqrt(dx*dx+dy*dy);
    tSph.radius=Math.max(1.5,Math.min(12,tSph.radius-(d-tDist)*0.01));tDist=d;
  }
  e.preventDefault();
},{passive:false});
renderer.domElement.addEventListener('touchend',()=>{isDragging=false;});

// ============================================================
// TOOLTIP
// ============================================================
const tooltip=document.getElementById('tooltip');
const ttN=tooltip.querySelector('.tt-name'),ttD=tooltip.querySelector('.tt-desc'),ttDim=tooltip.querySelector('.tt-dim');

function updateHover(e){
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(allParts.filter(p=>p.visible),false);
  if(hoveredPart&&(!hits.length||hits[0].object!==hoveredPart)){
    hoveredPart.material=hoveredPart.userData.originalMaterial;
    hoveredPart=null; tooltip.style.display='none';
  }
  if(hits.length>0){
    const o=hits[0].object;
    if(o!==hoveredPart&&o.userData.name){
      hoveredPart=o; o.material=M.hl;
      ttN.textContent=o.userData.name; ttD.textContent=o.userData.desc; ttDim.textContent=o.userData.dim;
      tooltip.style.display='block';
    }
  }
  if(tooltip.style.display==='block'&&e){
    let tx=e.clientX+16,ty=e.clientY-10;
    if(tx+280>window.innerWidth)tx=e.clientX-280;
    if(ty+100>window.innerHeight)ty=e.clientY-100;
    tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
  }
}
window.addEventListener('mousemove',updateHover);

// ============================================================
// LABELS UPDATE (project 3D → 2D every frame)
// ============================================================
const tempV = new THREE.Vector3();

function updateLabels(){
  const hw = window.innerWidth/2, hh = window.innerHeight/2;

  labelData.forEach(ld => {
    const mesh = ld.mesh;
    const el = ld.el;

    if(!labelsVisible || !mesh.visible){
      el.classList.add('hidden');
      return;
    }
    el.classList.remove('hidden');

    // Get world position of the mesh
    mesh.getWorldPosition(tempV);
    // Offset label slightly above
    tempV.y += 0.12;

    // Project to screen
    tempV.project(camera);

    // Behind camera check
    if(tempV.z > 1){
      el.classList.add('hidden');
      return;
    }

    const x = (tempV.x * hw) + hw;
    const y = -(tempV.y * hh) + hh;

    // Off-screen check
    if(x < -100 || x > window.innerWidth+100 || y < -100 || y > window.innerHeight+100){
      el.classList.add('hidden');
      return;
    }

    el.style.left = x + 'px';
    el.style.top = y + 'px';

    // Distance-based fade: fade labels when zoomed out far
    const dist = camera.position.distanceTo(mesh.getWorldPosition(new THREE.Vector3()));
    if(dist > 7){
      el.classList.add('faded');
    } else {
      el.classList.remove('faded');
    }
  });
}

// ============================================================
// VIEW MODES
// ============================================================
let currentView='assembled', expFactor=0, tExp=0;
const sliderWrap=document.getElementById('explosion-slider-wrap');
const slider=document.getElementById('explosion-slider');
slider.addEventListener('input',()=>{tExp=slider.value/100;});

function setView(mode){
  currentView=mode;
  document.querySelectorAll('#controls .ctrl-btn:not(#btn-labels-toggle):not(#btn-reset)').forEach(b=>b.classList.remove('active'));
  if(mode==='assembled'){
    document.getElementById('btn-assembled').classList.add('active');
    tExp=0; sliderWrap.style.display='none';
    allParts.forEach(p=>{p.visible=true;});
  } else if(mode==='exploded'){
    document.getElementById('btn-exploded').classList.add('active');
    tExp=slider.value/100; sliderWrap.style.display='flex';
    allParts.forEach(p=>{p.visible=true;});
  } else if(mode==='gate'){
    document.getElementById('btn-gate-only').classList.add('active');
    tExp=0.5; sliderWrap.style.display='flex';
    allParts.forEach(p=>{const c=p.userData.category; p.visible=c.startsWith('gate')||c==='hardware';});
  } else if(mode==='planter'){
    document.getElementById('btn-planter-only').classList.add('active');
    tExp=0.5; sliderWrap.style.display='flex';
    allParts.forEach(p=>{const c=p.userData.category; p.visible=!c.startsWith('gate');});
  }
}

function toggleLabels(){
  labelsVisible = !labelsVisible;
  document.getElementById('btn-labels-toggle').textContent = 'Labels: ' + (labelsVisible ? 'ON' : 'OFF');
  document.getElementById('btn-labels-toggle').classList.toggle('active', labelsVisible);
}

function resetCamera(){ tSph={theta:0.7,phi:1.1,radius:5.5}; }

function updateExplosion(){
  expFactor+=(tExp-expFactor)*0.05;
  allParts.forEach(p=>{
    if(!p.userData.assembledPos)return;
    const a=p.userData.assembledPos, o=p.userData.explodedOffset;
    p.position.set(a.x+o.x*expFactor, a.y+o.y*expFactor, a.z+o.z*expFactor);
  });
}

// ============================================================
// ANIMATE
// ============================================================
document.getElementById('btn-labels-toggle').classList.add('active');

function animate(){
  requestAnimationFrame(animate);
  updateCam();
  updateExplosion();
  updateLabels();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
